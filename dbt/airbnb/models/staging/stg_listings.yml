version: 2

models:
  - name: stg_listings
    description: Cleaned Tokyo Airbnb listings with typed columns
    columns:
      - name: listing_id
        description: Unique listing identifier
        tests: [unique, not_null]
      - name: host_id
        description: Host identifier
        tests: [not_null]
      - name: price
        description: Listing price in USD (null if not available)
      - name: room_type
        description: Type of room (Entire home/apt, Private room, Shared room, Hotel)
      - name: neighbourhood
        description: Tokyo neighbourhood name
      - name: review_scores_rating
        description: Overall review score (0-100 scale)
